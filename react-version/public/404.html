<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <script>
      // SPA fallback for GitHub Pages.
      // When a deep route (e.g. /about) is hit on first load, GH Pages returns
      // this 404 page. We rewrite it into a redirect to the app root with the
      // original path stashed in the query string, which index.html restores.
      (function () {
        var segmentCount = 1; // matches the repo-name segment in base path
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
